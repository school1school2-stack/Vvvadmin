<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مركز إدارة النماذج | أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --gold: #fbbf24; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* واجهة اختيار النموذج */
        .models-selector {
            display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 30px;
            padding: 20px; background: var(--card); border-radius: 20px; border: 1px solid #334155;
        }
        .model-btn {
            background: #334155; color: white; border: none; padding: 12px 25px;
            border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .model-btn.active { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }
        .model-btn:hover { background: var(--accent); color: #000; }

        /* التصميم العام */
        .dashboard-content { display: none; } /* يظهر عند اختيار نموذج */
        .active-view { display: block; }

        .header {
            background: linear-gradient(90deg, #1e293b, #334155);
            padding: 30px; border-radius: 24px; margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
        }

        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 20px; text-align: center; border-bottom: 4px solid var(--accent); }
        .stat-card p { font-size: 1.8rem; font-weight: bold; margin: 10px 0 0; color: var(--gold); }

        .charts-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px; margin-bottom: 30px; }
        .chart-box { background: var(--card); padding: 20px; border-radius: 24px; height: 350px; }

        .table-box { background: var(--card); border-radius: 24px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th { background: rgba(255,255,255,0.05); padding: 15px; color: var(--gold); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .print-section { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-print { background: var(--accent); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        @media print { .no-print { display: none !important; } .dashboard-content { display: block; } }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1 id="main-title">لوحة تحكم النماذج المستقلة</h1>
        <p>اختر النموذج لعرض التحليل الإحصائي المفصل</p>
    </div>

    <div class="models-selector no-print" id="model-btns">
        <button class="model-btn" onclick="loadModelData('15')">نموذج 15</button>
        <button class="model-btn" onclick="loadModelData('5')">نموذج 5</button>
        <button class="model-btn" onclick="loadModelData('20')">نموذج 20</button>
        </div>

    <div id="content-area" class="dashboard-content">
        <div class="print-section">
            <h2 id="current-model-name" style="color: var(--gold);">تقرير نموذج: --</h2>
            <button class="btn-print no-print" onclick="window.print()">🖨️ طباعة تقرير المدير</button>
        </div>

        <div class="stats-container">
            <div class="stat-card"><h3>المختبرين</h3><p id="s-count">0</p></div>
            <div class="stat-card"><h3>المتوسط</h3><p id="s-avg">0%</p></div>
            <div class="stat-card"><h3>أعلى درجة</h3><p id="s-max">0%</p></div>
            <div class="stat-card"><h3>التميز</h3><p id="s-exc">0</p></div>
        </div>

        <div class="charts-grid">
            <div class="chart-box"><canvas id="lineChart"></canvas></div>
            <div class="chart-box"><canvas id="pieChart"></canvas></div>
        </div>

        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>الطالب</th>
                        <th>الدرجة</th>
                        <th>تناظر</th>
                        <th>إكمال</th>
                        <th>سياقي</th>
                        <th>استيعاب</th>
                        <th>التقدير</th>
                    </tr>
                </thead>
                <tbody id="table-data"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let lChart, pChart;

    function loadModelData(modelNum) {
        // تحديث مظهر الأزرار
        document.querySelectorAll('.model-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        // إظهار المحتوى
        document.getElementById('content-area').classList.add('active-view');
        document.getElementById('current-model-name').innerText = "تقرير تفصيلي: نموذج " + modelNum;

        // جلب البيانات بفلترة رقم النموذج
        db.collection("student_results")
          .where("model_id", "==", modelNum) // هذا هو الفلتر المهم
          .orderBy("time", "desc")
          .onSnapshot(snapshot => {
            let scores = [], rows = "", exc = 0;
            let labels = [];

            snapshot.forEach(doc => {
                const d = doc.data();
                const p = Math.round((d.score / d.total) * 100);
                scores.push(p);
                labels.push(d.name);
                if(p >= 90) exc++;

                rows += `
                    <tr>
                        <td><strong>${d.name}</strong></td>
                        <td>${d.score}/${d.total}</td>
                        <td style="color:var(--accent)">${d.tanazor_p || '85%'}</td>
                        <td style="color:var(--accent)">${d.ekmal_p || '70%'}</td>
                        <td style="color:var(--accent)">${d.sayaqi_p || '90%'}</td>
                        <td style="color:var(--accent)">${d.comp_p || '60%'}</td>
                        <td style="color:${p>=80?'#4ade80':'#f87171'}">${p>=90?'ممتاز':p>=80?'جيد جداً':'مراجعة'}</td>
                    </tr>
                `;
            });

            document.getElementById('table-data').innerHTML = rows;
            updateStats(scores, exc);
            renderCharts(labels.reverse(), scores.reverse(), exc, scores.length - exc);
        });
    }

    function updateStats(s, exc) {
        if(s.length === 0) return;
        document.getElementById('s-count').innerText = s.length;
        document.getElementById('s-max').innerText = Math.max(...s) + "%";
        document.getElementById('s-avg').innerText = Math.round(s.reduce((a,b)=>a+b,0)/s.length) + "%";
        document.getElementById('s-exc').innerText = exc;
    }

    function renderCharts(labels, data, exc, others) {
        const ctx1 = document.getElementById('lineChart').getContext('2d');
        const gradient = ctx1.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(56, 189, 248, 0.4)');
        gradient.addColorStop(1, 'rgba(56, 189, 248, 0)');

        if(lChart) lChart.destroy();
        lChart = new Chart(ctx1, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'منحنى أداء الطلاب',
                    data: data,
                    borderColor: '#38bdf8', borderWidth: 4, fill: true, backgroundColor: gradient, tension: 0.45
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        const ctx2 = document.getElementById('pieChart').getContext('2d');
        if(pChart) pChart.destroy();
        pChart = new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['ممتاز (90%+)', 'بقية المستويات'],
                datasets: [{
                    data: [exc, others],
                    backgroundColor: ['#fbbf24', '#334155'],
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحليل الذكي - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --primary: #212121; --gold: #b19410; --bg: #f4f7f6; --danger: #b71c1c; --success: #1b5e20; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; }
        .model-card { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; overflow: hidden; border-right: 10px solid var(--gold); }
        .model-header { background: #fff; padding: 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .model-title { font-size: 1.4rem; font-weight: bold; color: var(--primary); }
        .model-content { display: none; padding: 25px; background: #fafafa; }
        
        /* قسم الإحصائيات */
        .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-box { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #ddd; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); }
        .q-analysis-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; font-size: 1rem; }
        .hard-tag { color: var(--danger); font-weight: bold; background: #fff1f1; padding: 2px 8px; border-radius: 5px; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; border: 1px solid #eee; text-align: center; }
        th { background: var(--primary); color: white; }
        .badge { background: var(--gold); color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        .empty-msg { text-align: center; padding: 40px; color: #777; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; margin-bottom: 40px;">
        <h1 style="color: var(--primary); margin-bottom: 10px;">🎯 نظام التحليل الذكي للنماذج</h1>
        <p style="color: #666;">تحليل تلقائي لمستوى الطلاب وصعوبة الأسئلة</p>
    </div>

    <div id="models-wrapper">
        <div class="empty-msg">جاري جلب تقارير الأداء من قاعدة البيانات...</div>
    </div>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    var firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // جلب البيانات ومعالجتها
    db.collection("student_results").orderBy("time", "desc").onSnapshot(snap => {
        const wrapper = document.getElementById("models-wrapper");
        if (snap.empty) {
            wrapper.innerHTML = '<div class="empty-msg">لا توجد نتائج مسجلة حتى الآن.</div>';
            return;
        }

        wrapper.innerHTML = "";
        let modelsData = {};

        // تجميع الطلاب تحت كل نموذج
        snap.forEach(doc => {
            const data = doc.data();
            const mName = data.model_name || "نموذج غير محدد";
            if (!modelsData[mName]) modelsData[mName] = [];
            modelsData[mName].push(data);
        });

        // إنشاء واجهة لكل نموذج
        Object.keys(modelsData).forEach((modelName, index) => {
            const students = modelsData[modelName];
            
            // 1. تحليل الأسئلة (الأكثر صعوبة)
            let questionErrors = {};
            students.forEach(s => {
                if (s.details) { // قراءة حقل التفاصيل الجديد
                    s.details.forEach(q => {
                        if (!q.isCorrect) {
                            questionErrors[q.question] = (questionErrors[q.question] || 0) + 1;
                        }
                    });
                }
            });

            let sortedHardest = Object.entries(questionErrors).sort((a, b) => b[1] - a[1]).slice(0, 4);

            const card = document.createElement("div");
            card.className = "model-card";
            card.innerHTML = `
                <div class="model-header" onclick="toggleModel(${index})">
                    <div>
                        <div class="model-title">📂 ${modelName}</div>
                        <div style="font-size: 0.9rem; color: #666; margin-top:5px;">إجمالي المختبرين: ${students.length} طالب</div>
                    </div>
                    <div style="color: var(--gold); font-weight: bold;">عرض التحليل والنتائج ⬇</div>
                </div>
                <div id="content-${index}" class="model-content">
                    
                    <div class="analytics-grid">
                        <div class="stat-box">
                            <h3 style="color: var(--danger); border-bottom: 2px solid; padding-bottom: 10px; margin-top:0;">⚠️ الأسئلة الأكثر صعوبة</h3>
                            ${sortedHardest.length > 0 ? sortedHardest.map(q => `
                                <div class="q-analysis-item">
                                    <span style="max-width: 70%;">${q[0]}</span>
                                    <span class="hard-tag">${q[1]} أخطاء</span>
                                </div>
                            `).join('') : '<p style="color:#999;">لا توجد أخطاء مسجلة بعد.</p>'}
                        </div>
                        
                        <div class="stat-box" style="display: flex; flex-direction: column; align-items: center;">
                            <h3 style="color: var(--primary); margin-top:0;">📈 ملخص أداء النموذج</h3>
                            <canvas id="chart-${index}" style="max-width: 250px; max-height: 250px;"></canvas>
                        </div>
                    </div>

                    <h3>👥 سجل الطلاب</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>اسم الطالب</th>
                                <th>الدرجة</th>
                                <th>تاريخ الاختبار</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${students.map(s => `
                                <tr>
                                    <td><b>${s.name}</b></td>
                                    <td><span class="badge">${s.score} / ${s.total}</span></td>
                                    <td>${s.time ? s.time.toDate().toLocaleString('ar-SA') : '...'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            wrapper.appendChild(card);
            renderModelChart(index, students);
        });
    });

    function toggleModel(id) {
        const content = document.getElementById(`content-${id}`);
        content.style.display = content.style.display === "block" ? "none" : "block";
    }

    function renderModelChart(id, students) {
        setTimeout(() => {
            const ctx = document.getElementById(`chart-${id}`).getContext('2d');
            const avgScore = (students.reduce((a, b) => a + b.score, 0) / students.length).toFixed(1);
            const totalQuestions = students[0].total;

            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['متوسط درجات الطلاب', 'الفقد التعليمي'],
                    datasets: [{
                        data: [avgScore, totalQuestions - avgScore],
                        backgroundColor: ['#b19410', '#e0e0e0'],
                        borderWidth: 0
                    }]
                },
                options: {
                    plugins: {
                        legend: { position: 'bottom' }
                    },
                    cutout: '70%'
                }
            });
        }, 500);
    }
</script>
</body>
</html>

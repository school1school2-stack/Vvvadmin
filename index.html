<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحليل الذكي | أ / عبدالعزيز الفيفي</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #f8fafc; --card-bg: #ffffff; --accent: #0284c7;
            --gold: #b45309; --danger: #dc2626; --text-main: #1e293b;
            --text-sub: #64748b; --border: #e2e8f0; --row-alt: #fffdec;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 20px; }
        .dashboard { max-width: 1450px; margin: auto; }

        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 25px; border-radius: 20px; margin-bottom: 25px; border-bottom: 5px solid var(--accent); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header h1 { margin: 0; color: var(--accent); font-size: 1.8rem; }

        .model-nav { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding: 10px; background: white; border-radius: 15px; }
        .model-btn { background: #f1f5f9; border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .model-btn.active { background: var(--accent); color: white; }

        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        .stat-card p { font-size: 1.6rem; font-weight: bold; color: var(--accent); margin: 5px 0 0; }

        .main-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 25px; }
        .chart-wrapper { background: white; padding: 20px; border-radius: 20px; border: 1px solid var(--border); height: 380px; }

        .table-box { background: white; border-radius: 20px; overflow-x: auto; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        table { width: 100%; border-collapse: collapse; text-align: right; min-width: 1100px; }
        th { background: #f8fafc; padding: 15px; color: var(--text-sub); border-bottom: 2px solid var(--border); font-size: 0.85rem; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tbody tr:nth-child(even) { background-color: var(--row-alt); }
        
        .prog-circle { width: 45px; height: 6px; background: #eee; border-radius: 10px; overflow: hidden; margin-top: 4px; }
        .prog-fill { height: 100%; }

        #qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; text-align: center; max-width: 400px; }
        
        @media print { .no-print { display: none !important; } }
        .view-only-hide { display: none !important; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="nav-bar" class="model-nav no-print"></div>

    <div class="header">
        <div>
            <h1 id="main-title">📊 منصة التحليل الذكي</h1>
            <p style="color: var(--text-sub); margin-top: 5px;">أ / عبدالعزيز بن موسى الفيفي</p>
        </div>
        <div id="action-area" class="no-print">
            <button class="model-btn" style="background:#1e293b; color:white" onclick="window.print()">🖨️ طباعة</button>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-card"><h3>المختبرين</h3><p id="count">0</p></div>
        <div class="stat-card"><h3>متوسط الأداء</h3><p id="avg">0%</p></div>
        <div class="stat-card"><h3>أعلى نتيجة</h3><p id="max">0%</p></div>
        <div class="stat-card"><h3>دون المتوسط</h3><p id="low">0</p></div>
    </div>

    <div class="main-grid">
        <div class="chart-wrapper"><canvas id="skillsChart"></canvas></div>
        <div class="chart-wrapper"><canvas id="levelsChart"></canvas></div>
    </div>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>اسم الطالب</th>
                    <th>الدرجة</th>
                    <th>تناظر</th>
                    <th>إكمال</th>
                    <th>سياقي</th>
                    <th>استيعاب</th>
                    <th>شاذة</th>
                    <th>ارتباط</th>
                    <th>اختلاف</th>
                    <th>النموذج</th>
                    <th id="action-header" class="no-print">إجراء</th>
                </tr>
            </thead>
            <tbody id="data-rows"></tbody>
        </table>
    </div>
</div>

<div id="qr-modal">
    <div class="modal-content">
        <div id="qrcode"></div>
        <input type="text" id="share-url" readonly style="width: 100%; margin: 15px 0; text-align: center; padding: 8px;">
        <button class="model-btn" onclick="copyLink()">نسخ الرابط</button>
        <button class="model-btn" style="background:#666; color:white" onclick="closeQR()">إغلاق</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let chartA, chartB, currentUnsubscribe = null, selectedModel = 'all';

    const urlParams = new URLSearchParams(window.location.search);
    const isViewOnly = urlParams.has('view');
    const viewId = urlParams.get('view');

    function initListener(modelId) {
        if (currentUnsubscribe) currentUnsubscribe();
        if(isViewOnly) {
            document.getElementById('action-header').classList.add('view-only-hide');
            document.getElementById('nav-bar').classList.add('view-only-hide');
        }

        currentUnsubscribe = db.collection("student_results").orderBy("time", "desc").onSnapshot(snapshot => {
            if(!isViewOnly) updateModelButtons(snapshot);
            
            let scores = [], rows = "";
            let levels = { exc: 0, vgood: 0, good: 0, acc: 0, weak: 0 };
            let skillsSums = { tan: 0, ekm: 0, syq: 0, st: 0, mfr: 0, art: 0, ikh: 0 };
            let studentCount = 0;

            snapshot.forEach(doc => {
                const d = doc.data();
                let actualModel = d.model_id || '15';
                if (modelId === 'all' || actualModel == modelId) {
                    const p = Math.round((d.score / d.total) * 100);
                    scores.push(p);
                    studentCount++;

                    if(p >= 90) levels.exc++;
                    else if(p >= 80) levels.vgood++;
                    else if(p >= 70) levels.good++;
                    else if(p >= 60) levels.acc++;
                    else levels.weak++;

                    let s = d.sections || { 
                        tan: p, ekm: Math.max(0, p-5), syq: Math.min(100, p+3), 
                        st: Math.max(0, p-10), mfr: p, art: Math.min(100, p+2), ikh: Math.max(0, p-4) 
                    };
                    Object.keys(skillsSums).forEach(k => skillsSums[k] += s[k]);

                    rows += `<tr>
                        <td><strong>${d.name}</strong></td>
                        <td style="color:var(--accent); font-weight:bold">${d.score}/${d.total}</td>
                        ${['tan','ekm','syq','st','mfr','art','ikh'].map(k => `<td>${s[k]}%<div class="prog-circle"><div class="prog-fill" style="width:${s[k]}%; background:${s[k]<60?'#ef4444':s[k]<80?'#f59e0b':'#10b981'}"></div></div></td>`).join('')}
                        <td>${actualModel}</td>
                        <td class="no-print ${isViewOnly ? 'view-only-hide' : ''}">
                            <button style="color:red;border:none;background:none;cursor:pointer;font-weight:bold" onclick="deleteDoc('${doc.id}')">حذف</button>
                        </td>
                    </tr>`;
                }
            });

            document.getElementById('data-rows').innerHTML = rows;
            updateSummary(scores, levels);
            let avgSkills = ['tan','ekm','syq','st','mfr','art','ikh'].map(k => Math.round(skillsSums[k] / studentCount) || 0);
            drawCharts(levels, avgSkills);
        });
    }

    function setMod(m) { 
        selectedModel = m; 
        document.getElementById('main-title').innerText = m === 'all' ? "📊 منصة التحليل الذكي" : `📊 تحليل نموذج (${m})`;
        initListener(m); 
    }

    function updateModelButtons(snapshot) {
        if(isViewOnly) return;
        const navBar = document.getElementById('nav-bar');
        const foundModels = new Set();
        snapshot.forEach(doc => foundModels.add(doc.data().model_id?.toString() || "15"));
        let buttonsHtml = `<button class="model-btn ${selectedModel === 'all' ? 'active' : ''}" onclick="setMod('all')">🌍 الكل</button>`;
        Array.from(foundModels).sort().forEach(mId => {
            buttonsHtml += `<button class="model-btn ${selectedModel === mId ? 'active' : ''}" onclick="setMod('${mId}')">${mId}</button>`;
        });
        navBar.innerHTML = buttonsHtml;
    }

    async function deleteDoc(id) { 
        if(isViewOnly) return;
        if(confirm("حذف نتيجة هذا الطالب؟")) await db.collection("student_results").doc(id).delete(); 
    }

    function updateSummary(s, l) {
        document.getElementById('count').innerText = s.length;
        if(s.length > 0) {
            document.getElementById('avg').innerText = Math.round(s.reduce((a,b)=>a+b,0)/s.length) + "%";
            document.getElementById('max').innerText = Math.max(...s) + "%";
            document.getElementById('low').innerText = l.acc + l.weak;
        }
    }

    function drawCharts(lv, skills) {
        const ctx1 = document.getElementById('skillsChart').getContext('2d');
        if(chartA) chartA.destroy();
        chartA = new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: ['تناظر', 'إكمال', 'سياقي', 'استيعاب', 'شاذة', 'ارتباط', 'اختلاف'],
                datasets: [{ label: 'الأداء', data: skills, backgroundColor: '#3b82f6', borderRadius: 5 }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        const ctx2 = document.getElementById('levelsChart').getContext('2d');
        if(chartB) chartB.destroy();
        chartB = new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['ممتاز', 'جيد جداً', 'جيد', 'مقبول', 'ضعيف'],
                datasets: [{ data: [lv.exc, lv.vgood, lv.good, lv.acc, lv.weak], backgroundColor: ['#10b981', '#0284c7', '#f59e0b', '#b45309', '#ef4444'] }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    if(isViewOnly) setMod(viewId); else setMod('all');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة القيادة الذكية | تقارير أ / عبدالعزيز بن موسى الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f8fafc; --card-bg: #ffffff; --accent: #0284c7;
            --gold: #b45309; --danger: #dc2626; --text-main: #1e293b;
            --text-sub: #64748b; --border: #e2e8f0;
            --row-alt: #fffdec;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 20px; }
        .dashboard { max-width: 1500px; margin: auto; }
        .table-box { background: var(--card-bg); border-radius: 20px; overflow-x: auto; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; text-align: right; min-width: 1200px; }
        th { background: #f1f5f9; padding: 15px; color: var(--text-sub); border-bottom: 2px solid var(--border); font-size: 0.85rem; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tbody tr:nth-child(even) { background-color: var(--row-alt); }
        .email-cell { font-family: monospace; color: #0369a1; font-size: 0.85rem; font-weight: bold; }
        .model-nav { display: flex; gap: 10px; margin-bottom: 25px; padding: 10px; background: var(--card-bg); border-radius: 15px; overflow-x: auto; }
        .model-btn { background: #f1f5f9; border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .model-btn.active { background: var(--accent); color: white; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 25px; border-radius: 20px; margin-bottom: 25px; border-bottom: 5px solid var(--accent); }
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        .chart-wrapper { background: white; padding: 20px; border-radius: 20px; border: 1px solid var(--border); height: 350px; margin-bottom: 20px; }
        .view-only-hide { display: none !important; }
        .main-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; margin-bottom: 25px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="model-nav no-print" id="nav-bar"></div>

    <div class="header">
        <div>
            <h1 id="main-title">📊 منصة التحليل الذكي</h1>
            <p style="color: var(--text-sub); margin: 5px 0 0;">متابعة دقيقة لمستويات الإخفاق والتميز - أ / عبدالعزيز بن موسى الفيفي</p>
        </div>
        <button class="model-btn" style="background:#1e293b; color:white" onclick="window.print()">🖨️ طباعة</button>
    </div>

    <div class="stats-container">
        <div class="stat-card"><h3>المختبرون</h3><p id="count">0</p></div>
        <div class="stat-card"><h3>متوسط الأداء</h3><p id="avg">0%</p></div>
        <div class="stat-card"><h3>أعلى نتيجة</h3><p id="max">0%</p></div>
        <div class="stat-card"><h3>دون المتوسط</h3><p id="low">0</p></div>
    </div>

    <div class="main-grid">
        <div class="chart-wrapper"><canvas id="skillsChart"></canvas></div>
        <div class="chart-wrapper"><canvas id="levelsChart"></canvas></div>
    </div>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>اسم الطالب</th>
                    <th>البريد الوزاري</th>
                    <th>الصف / الفصل</th>
                    <th>الدرجة</th>
                    <th>تناظر</th>
                    <th>إكمال</th>
                    <th>سياقي</th>
                    <th>استيعاب</th>
                    <th>النموذج</th>
                    <th class="no-print">إجراء</th>
                </tr>
            </thead>
            <tbody id="data-rows"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let chartA, chartB, currentUnsubscribe = null, selectedModel = 'all';

    function initListener(modelId) {
        if (currentUnsubscribe) currentUnsubscribe();
        
        currentUnsubscribe = db.collection("student_results").orderBy("time", "desc").onSnapshot(snapshot => {
            updateModelButtons(snapshot);
            
            let scores = [], rows = "";
            let levels = { exc: 0, vgood: 0, good: 0, acc: 0, weak: 0 };
            let skillsSums = { tan: 0, ekm: 0, syq: 0, st: 0 };
            let studentCount = 0;

            snapshot.forEach(doc => {
                const d = doc.data();
                let actualModel = d.model_id || 'تحدي';
                
                if (modelId === 'all' || actualModel == modelId) {
                    const p = Math.round((d.score / d.total) * 100);
                    scores.push(p);
                    studentCount++;

                    if(p >= 90) levels.exc++;
                    else if(p >= 80) levels.vgood++;
                    else if(p >= 70) levels.good++;
                    else if(p >= 60) levels.acc++;
                    else levels.weak++;

                    // --- التعديل الجوهري لسحب البيانات ---
                    // الكود الجديد يقرأ من الحقول المنفصلة مباشرة (name, email, student_class)
                    let studentName = d.name || "---";
                    let studentEmail = d.email || "---"; 
                    let classInfo = d.student_class || "---";

                    // منطق توافق مع البيانات القديمة (إذا لم يوجد حقل إيميل منفصل)
                    if (studentEmail === "---" && d.name.includes('|')) {
                        let parts = d.name.split('|');
                        studentName = parts[0];
                        studentEmail = parts[1];
                        classInfo = parts[2] || "---";
                    }

                    let s = d.sections || { 
                        tan: p, ekm: Math.max(0, p-5), syq: Math.min(100, p+3), st: Math.max(0, p-10) 
                    };
                    
                    Object.keys(skillsSums).forEach(k => { if(s[k]) skillsSums[k] += s[k]; });

                    rows += `<tr>
                        <td><strong>${studentName}</strong></td>
                        <td class="email-cell">${studentEmail}</td>
                        <td style="font-weight:bold; color:#444">${classInfo}</td>
                        <td style="color:var(--accent); font-weight:bold">${d.score}/${d.total}</td>
                        <td>${s.tan}%</td><td>${s.ekm}%</td><td>${s.syq}%</td><td>${s.st}%</td>
                        <td>${actualModel}</td>
                        <td class="no-print">
                            <button style="color:red;border:none;background:none;cursor:pointer" onclick="deleteDoc('${doc.id}')">حذف</button>
                        </td>
                    </tr>`;
                }
            });

            document.getElementById('data-rows').innerHTML = rows;
            updateSummary(scores, levels);
            let avgSkills = ['tan','ekm','syq','st'].map(k => Math.round(skillsSums[k] / studentCount) || 0);
            drawCharts(levels, avgSkills);
        });
    }

    function updateSummary(s, l) {
        document.getElementById('count').innerText = s.length;
        if(s.length > 0) {
            document.getElementById('avg').innerText = Math.round(s.reduce((a,b)=>a+b,0)/s.length) + "%";
            document.getElementById('max').innerText = Math.max(...s) + "%";
            document.getElementById('low').innerText = l.acc + l.weak;
        }
    }

    async function deleteDoc(id) { if(confirm("حذف الطالب؟")) await db.collection("student_results").doc(id).delete(); }

    function drawCharts(lv, skills) {
        const ctx1 = document.getElementById('skillsChart').getContext('2d');
        if(chartA) chartA.destroy();
        chartA = new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: ['تناظر', 'إكمال', 'سياقي', 'استيعاب'],
                datasets: [{ label: 'متوسط الأداء', data: skills, backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'], borderRadius: 8 }]
            },
            options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } }
        });

        const ctx2 = document.getElementById('levelsChart').getContext('2d');
        if(chartB) chartB.destroy();
        chartB = new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['ممتاز', 'جيد جداً', 'جيد', 'مقبول', 'ضعيف'],
                datasets: [{ data: [lv.exc, lv.vgood, lv.good, lv.acc, lv.weak], backgroundColor: ['#10b981', '#0284c7', '#f59e0b', '#b45309', '#ef4444'] }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    function setMod(m) { selectedModel = m; initListener(m); }
    function updateModelButtons(snapshot) {
        const navBar = document.getElementById('nav-bar');
        const foundModels = new Set();
        snapshot.forEach(doc => foundModels.add(doc.data().model_id?.toString() || "تحدي"));
        let buttonsHtml = `<button class="model-btn ${selectedModel === 'all' ? 'active' : ''}" onclick="setMod('all')">🌍 الكل</button>`;
        Array.from(foundModels).sort().forEach(mId => {
            buttonsHtml += `<button class="model-btn ${selectedModel === mId ? 'active' : ''}" onclick="setMod('${mId}')">${mId}</button>`;
        });
        navBar.innerHTML = buttonsHtml;
    }

    setMod('all');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | أ / عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root {
            --bg: #f8fafc; --maroon: #800000; --gold: #d4af37;
            --text: #1e293b; --border: #e2e8f0;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1200px; margin: auto; }
        .header { background: var(--maroon); color: var(--gold); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding: 10px; }
        .nav-btn { background: white; border: 1px solid var(--maroon); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .nav-btn.active { background: var(--maroon); color: white; }
        .table-box { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th { background: #f1f5f9; padding: 15px; border-bottom: 2px solid var(--border); color: var(--maroon); }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        tr:nth-child(even) { background-color: #fffdf5; }
        .delete-btn { color: #dc2626; border: none; background: none; cursor: pointer; font-weight: bold; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 لوحة تحكم النتائج</h1>
        <p>أ / عبدالعزيز بن موسى الفيفي</p>
    </div>

    <div id="nav-bar" class="nav-bar no-print"></div>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>اسم الطالب</th>
                    <th>الدرجة</th>
                    <th>النموذج</th>
                    <th class="no-print">إجراء</th>
                </tr>
            </thead>
            <tbody id="results-table"></tbody>
        </table>
    </div>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentFilter = 'all';

    function loadData(filter) {
        db.collection("student_results").orderBy("time", "desc").onSnapshot(snapshot => {
            const models = new Set();
            let rows = "";

            snapshot.forEach(doc => {
                const d = doc.data();
                if (d.model_id) models.add(d.model_id);

                if (filter === 'all' || d.model_id === filter) {
                    rows += `
                        <tr>
                            <td><strong>${d.name || "---"}</strong></td>
                            <td style="color:var(--maroon); font-weight:bold">${d.score} / ${d.total}</td>
                            <td>${d.model_id}</td>
                            <td class="no-print">
                                <button class="delete-btn" onclick="deleteDoc('${doc.id}')">حذف</button>
                            </td>
                        </tr>`;
                }
            });

            document.getElementById('results-table').innerHTML = rows;
            updateNav(models);
        });
    }

    function updateNav(models) {
        let html = `<button class="nav-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="filterBy('all')">الكل</button>`;
        Array.from(models).sort().forEach(m => {
            html += `<button class="nav-btn ${currentFilter === m ? 'active' : ''}" onclick="filterBy('${m}')">${m}</button>`;
        });
        document.getElementById('nav-bar').innerHTML = html;
    }

    function filterBy(m) {
        currentFilter = m;
        loadData(m);
    }

    async function deleteDoc(id) {
        if(confirm("حذف هذه النتيجة؟")) await db.collection("student_results").doc(id).delete();
    }

    loadData('all');
</script>
</body>
</html>

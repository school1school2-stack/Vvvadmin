<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة القيادة الذكية | أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card-bg: #1e293b; --accent: #38bdf8; 
            --gold: #fbbf24; --text: #f1f5f9; --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 20px;
        }

        .dashboard { max-width: 1300px; margin: auto; }

        /* شريط التنقل العلوي بين النماذج */
        .model-selector-bar {
            display: flex; gap: 12px; margin-bottom: 25px; padding: 15px;
            background: var(--card-bg); border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); overflow-x: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .model-btn {
            background: #334155; color: var(--text); border: none; padding: 12px 24px;
            border-radius: 14px; cursor: pointer; white-space: nowrap; 
            font-weight: bold; transition: 0.3s; font-size: 0.95rem;
        }

        .model-btn.active {
            background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 35px; border-radius: 24px; margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .header h1 { margin: 0; color: var(--gold); font-size: 2rem; }

        /* كروت الإحصائيات */
        .stats-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg); padding: 25px; border-radius: 22px;
            text-align: center; border: 1px solid rgba(56, 189, 248, 0.1);
            transition: 0.3s;
        }

        .stat-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .stat-card h3 { margin: 0; font-size: 1rem; color: #94a3b8; }
        .stat-card p { font-size: 2.2rem; font-weight: 800; color: var(--accent); margin: 10px 0 0; }

        /* الرسوم البيانية */
        .main-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px; margin-bottom: 30px; }
        .chart-box {
            background: var(--card-bg); padding: 25px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05); height: 400px;
        }

        /* الجدول */
        .table-container {
            background: var(--card-bg); border-radius: 24px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        table { width: 100%; border-collapse: collapse; text-align: right; }
        th { background: rgba(255,255,255,0.03); padding: 22px; color: var(--gold); font-size: 1rem; }
        td { padding: 18px 22px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 1rem; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .tag { padding: 4px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; }
        .tag-model { background: rgba(56, 189, 248, 0.1); color: var(--accent); }

        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
        @media print { .no-print { display: none !important; } body { background: #fff; color: #000; } }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="model-selector-bar no-print">
        <button class="model-btn active" onclick="updateDashboard('all', this)">🌍 كافة النماذج</button>
        <button class="model-btn" onclick="updateDashboard('15', this)">النموذج 15</button>
        <button class="model-btn" onclick="updateDashboard('16', this)">النموذج 16</button>
        <button class="model-btn" onclick="updateDashboard('17', this)">النموذج 17</button>
    </div>

    <div class="header">
        <div>
            <h1 id="view-title">📊 لوحة الأداء الشاملة</h1>
            <p style="color: #94a3b8; margin: 8px 0 0;">المشرف العام: أ/ عبدالعزيز الفيفي</p>
        </div>
        <button class="model-btn" style="background:var(--gold); color:#000" onclick="window.print()">🖨️ تصدير تقرير PDF</button>
    </div>

    <div class="stats-container">
        <div class="stat-card"><h3>إجمالي المختبرين</h3><p id="total-students">0</p></div>
        <div class="stat-card"><h3>متوسط الدرجات</h3><p id="avg-score">0%</p></div>
        <div class="stat-card"><h3>أعلى طموح</h3><p id="top-score" style="color: #4ade80;">0%</p></div>
        <div class="stat-card"><h3>تحت المستوى (80%)</h3><p id="low-performers" style="color: #f87171;">0</p></div>
    </div>

    <div class="main-grid">
        <div class="chart-box"><canvas id="mainChart"></canvas></div>
        <div class="chart-box"><canvas id="pieChart"></canvas></div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>اسم المتدرب</th>
                    <th>الدرجة النهائية</th>
                    <th>النسبة المئوية</th>
                    <th>النموذج</th>
                    <th>التوقيت</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="student-table-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let myChart, myPieChart, currentListener = null;

    function updateDashboard(modelId, btn) {
        // تحديث شكل الأزرار
        document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const title = modelId === 'all' ? "📊 لوحة الأداء الشاملة" : `📊 تحليل نتائج النموذج (${modelId})`;
        document.getElementById('view-title').innerText = title;

        loadData(modelId);
    }

    function loadData(modelId) {
        if (currentListener) currentListener(); // إغلاق المستمع السابق لمنع التكرار

        // جلب البيانات من السحابة مرتبة حسب الوقت الأحدث
        currentListener = db.collection("student_results").orderBy("time", "desc").onSnapshot(snapshot => {
            let tableHTML = "";
            let scoresArray = [];
            let counts = { superior: 0, good: 0, weak: 0 };

            snapshot.forEach(doc => {
                const data = doc.data();
                
                // منطق الفلترة المطور:
                // 1. إذا اخترنا "الكل" -> يظهر الجميع
                // 2. إذا اخترنا نموذج معين -> يظهر أصحابه
                // 3. إذا كان الطالب قديماً (ليس له رقم نموذج) -> نضعه في نموذج 15 تلقائياً
                let shouldShow = false;
                if (modelId === 'all') shouldShow = true;
                else if (data.model_id == modelId) shouldShow = true;
                else if (!data.model_id && modelId == '15') shouldShow = true;

                if (shouldShow) {
                    const percentage = Math.round((data.score / data.total) * 100);
                    scoresArray.push(percentage);

                    // تصنيف المستوى
                    if (percentage >= 90) counts.superior++;
                    else if (percentage >= 80) counts.good++;
                    else counts.weak++;

                    const dateStr = data.time ? new Date(data.time.seconds * 1000).toLocaleDateString('ar-SA') : '---';

                    tableHTML += `
                        <tr>
                            <td><strong>${data.name}</strong></td>
                            <td>${data.score} / ${data.total}</td>
                            <td style="color:var(--accent); font-weight:bold;">${percentage}%</td>
                            <td><span class="tag tag-model">${data.model_id || '15 (سابق)'}</span></td>
                            <td style="font-size:0.85rem; color:#94a3b8;">${dateStr}</td>
                            <td><span style="color: ${percentage >= 80 ? '#4ade80' : '#f87171'}">
                                ${percentage >= 80 ? '● مجتاز' : '● يحتاج دعم'}
                            </span></td>
                        </tr>
                    `;
                }
            });

            document.getElementById('student-table-body').innerHTML = tableHTML;
            updateStats(scoresArray, counts);
            renderCharts(counts, scoresArray);
        });
    }

    function updateStats(scores, counts) {
        const total = scores.length;
        document.getElementById('total-students').innerText = total;
        if (total > 0) {
            document.getElementById('avg-score').innerText = Math.round(scores.reduce((a,b)=>a+b,0)/total) + "%";
            document.getElementById('top-score').innerText = Math.max(...scores) + "%";
            document.getElementById('low-performers').innerText = counts.weak;
        } else {
            document.getElementById('avg-score').innerText = "0%";
            document.getElementById('top-score').innerText = "0%";
            document.getElementById('low-performers').innerText = "0";
        }
    }

    function renderCharts(counts, scores) {
        // الرسم البياني الدائري (توزيع المستويات)
        const ctxPie = document.getElementById('pieChart').getContext('2d');
        if (myPieChart) myPieChart.destroy();
        myPieChart = new Chart(ctxPie, {
            type: 'doughnut',
            data: {
                labels: ['ممتاز (90%+)', 'جيد جداً (80%+)', 'دون الـ 80%'],
                datasets: [{
                    data: [counts.superior, counts.good, counts.weak],
                    backgroundColor: ['#4ade80', '#fbbf24', '#f87171'],
                    borderWidth: 0
                }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: {color: '#f1f5f9'} } } }
        });

        // الرسم البياني الخطي (تتبع الدرجات)
        const ctxMain = document.getElementById('mainChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctxMain, {
            type: 'line',
            data: {
                labels: scores.map((_, i) => `طالب ${i+1}`),
                datasets: [{
                    label: 'النسبة المئوية',
                    data: scores.reverse(),
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, max: 100, grid: {color: 'rgba(255,255,255,0.05)'}, ticks: {color: '#94a3b8'} },
                    x: { grid: {display: false}, ticks: {color: '#94a3b8'} }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    // التشغيل الافتراضي عند فتح الصفحة
    loadData('all');
</script>
</body>
</html>

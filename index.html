<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحليل النهائية | أ/ عبدالعزيز الفيفي</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --accent: #0284c7; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; direction: rtl; }
        .header { background: white; padding: 20px; border-radius: 15px; border-bottom: 5px solid var(--accent); margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .stat-card h3 { margin: 0; font-size: 0.9rem; color: #64748b; }
        .stat-card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        .table-box { background: white; border-radius: 15px; overflow-x: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th { background: #f1f5f9; padding: 12px; border-bottom: 2px solid var(--border); font-size: 0.85rem; }
        td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tr:nth-child(even) { background: #fffdec; }
        .prog-bar { width: 100%; height: 6px; background: #eee; border-radius: 10px; overflow: hidden; }
        .prog-fill { height: 100%; }
        .no-print { display: inline-block; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="header">
    <h1>📊 لوحة النتائج الذكية</h1>
    <p>أ / عبدالعزيز بن موسى الفيفي</p>
</div>

<div class="stats-container">
    <div class="stat-card"><h3>إجمالي الطلاب</h3><p id="count">0</p></div>
    <div class="stat-card"><h3>متوسط الدرجة</h3><p id="avg">0%</p></div>
    <div class="stat-card"><h3>أعلى نتيجة</h3><p id="max">0%</p></div>
</div>

<div class="table-box">
    <table>
        <thead>
            <tr>
                <th>اسم الطالب</th>
                <th>الدرجة</th>
                <th>تناظر</th>
                <th>إكمال</th>
                <th>سياقي</th>
                <th>استيعاب</th>
                <th>شاذة</th>
                <th>ارتباط</th>
                <th>اختلاف</th>
                <th>النموذج</th>
                <th class="no-print">إجراء</th>
            </tr>
        </thead>
        <tbody id="data-rows"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    db.collection("student_results").orderBy("time", "desc").onSnapshot(snapshot => {
        let rows = "";
        let scores = [];
        
        snapshot.forEach(doc => {
            const d = doc.data();
            const p = Math.round((d.score / d.total) * 100);
            scores.push(p);

            // مصفوفة المهارات الافتراضية إذا لم تكن موجودة
            let s = d.sections || { tan:p, ekm:p, syq:p, st:p, mfr:p, art:p, ikh:p };

            // بناء الصف يدوياً للتأكد من عدم وجود أعمدة زائدة
            rows += `<tr>
                <td><strong>${d.name || '---'}</strong></td>
                <td style="font-weight:bold; color:var(--accent)">${d.score}/${d.total}</td>
                ${['tan','ekm','syq','st','mfr','art','ikh'].map(k => `
                    <td>${s[k]}%<div class="prog-bar"><div class="prog-fill" style="width:${s[k]}%; background:${s[k]<60?'#ef4444':'#10b981'}"></div></div></td>
                `).join('')}
                <td>${d.model_id || '---'}</td>
                <td class="no-print"><button onclick="deleteDoc('${doc.id}')" style="color:red; cursor:pointer; border:none; background:none;">حذف</button></td>
            </tr>`;
        });

        document.getElementById('data-rows').innerHTML = rows;
        document.getElementById('count').innerText = scores.length;
        if(scores.length > 0) {
            document.getElementById('avg').innerText = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) + "%";
            document.getElementById('max').innerText = Math.max(...scores) + "%";
        }
    });

    async function deleteDoc(id) {
        if(confirm("هل تريد حذف هذه النتيجة؟")) await db.collection("student_results").doc(id).delete();
    }
</script>
</body>
</html>

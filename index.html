<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | الكود الذهبي - أ/ عبدالعزيز الفيفي</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --main: #1a237e; --gold: #c5a021; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        
        .admin-container { max-width: 1200px; margin: auto; }
        
        /* الهيدر */
        .admin-header { 
            background: linear-gradient(135deg, var(--main), #0d47a1); 
            color: var(--gold); padding: 30px; border-radius: 20px; 
            text-align: center; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }

        /* كروت الإحصائيات */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--white); padding: 25px; border-radius: 15px; 
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            border-top: 5px solid var(--gold); 
        }
        .stat-card h3 { margin: 0; font-size: 0.9rem; color: #777; }
        .stat-card .val { font-size: 2rem; font-weight: bold; color: var(--main); margin-top: 10px; display: block; }

        /* منطقة الرسوم البيانية */
        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; margin-bottom: 30px; }
        .chart-container { background: var(--white); padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* الجدول */
        .table-box { background: var(--white); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; color: var(--main); padding: 15px; text-align: right; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        tr:hover { background: #fcf9ee; }

        /* الأزرار والبادج */
        .badge { padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 0.8rem; }
        .status-success { background: #e8f5e9; color: #2e7d32; }
        .status-warn { background: #fff3e0; color: #ef6c00; }
        
        .print-btn { 
            background: var(--main); color: var(--gold); border: none; 
            padding: 12px 25px; border-radius: 10px; cursor: pointer; 
            font-weight: bold; font-size: 1rem; transition: 0.3s;
        }
        .print-btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
        @media print { .no-print { display: none !important; } .admin-container { width: 100%; } }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="admin-header">
        <h1 style="margin:0;">📊 نظام تحليل الأداء الرقمي</h1>
        <p style="margin:10px 0 0; opacity: 0.8;">بإشراف الخبير: عبدالعزيز الفيفي</p>
    </div>

    <div class="stats-row no-print">
        <div class="stat-card"><h3>إجمالي المختبرين</h3><span class="val" id="total-v">0</span></div>
        <div class="stat-card"><h3>متوسط درجات الطلاب</h3><span class="val" id="avg-v">0</span></div>
        <div class="stat-card"><h3>أعلى درجة محققة</h3><span class="val" id="max-v" style="color: #2e7d32;">0</span></div>
        <div class="stat-card"><h3>تحتاج مراجعة</h3><span class="val" id="low-v" style="color: #c62828;">0</span></div>
    </div>

    <div class="charts-grid no-print">
        <div class="chart-container">
            <h4 style="margin:0 0 15px;">📈 منحنى مستويات الطلاب (التطور الزمني)</h4>
            <canvas id="mainChart" height="250"></canvas>
        </div>
        <div class="chart-container">
            <h4 style="margin:0 0 15px;">🎯 تحليل النماذج</h4>
            <canvas id="pieChart" height="250"></canvas>
        </div>
    </div>

    <div style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
        <h3 style="margin:0;">📋 سجل النتائج التفصيلي:</h3>
        <button class="print-btn no-print" onclick="window.print()">🖨️ طباعة تقرير المدير (PDF)</button>
    </div>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>اسم الطالب</th>
                    <th>النموذج</th>
                    <th>الدرجة</th>
                    <th>النسبة</th>
                    <th>الوقت</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="data-table-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let mainChart, pieChart;

    // مراقبة البيانات لحظة بلحظة
    db.collection("student_results").orderBy("time", "desc").onSnapshot((snapshot) => {
        let rows = "";
        let scores = [];
        let labels = [];
        let passCount = 0;
        let failCount = 0;

        snapshot.forEach((doc) => {
            const d = doc.data();
            const dateStr = d.time ? d.time.toDate().toLocaleDateString('ar-SA') : "-";
            const percent = Math.round((d.score / d.total) * 100);
            
            scores.push(d.score);
            labels.push(d.name);
            
            if(percent >= 80) passCount++; else failCount++;

            rows += `
                <tr>
                    <td><strong>${d.name}</strong></td>
                    <td><span style="color:var(--main)">نموذج 15</span></td>
                    <td>${d.score} / ${d.total}</td>
                    <td>${percent}%</td>
                    <td style="font-size:0.8rem; color:#666">${dateStr}</td>
                    <td><span class="badge ${percent >= 80 ? 'status-success' : 'status-warn'}">${percent >= 80 ? 'متميز' : 'مراجعة'}</span></td>
                </tr>
            `;
        });

        document.getElementById('data-table-body').innerHTML = rows;
        updateSummary(scores, failCount);
        renderCharts(labels.reverse(), scores.reverse(), passCount, failCount);
    });

    function updateSummary(scores, lowCount) {
        if(scores.length === 0) return;
        document.getElementById('total-v').innerText = scores.length;
        document.getElementById('avg-v').innerText = (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1);
        document.getElementById('max-v').innerText = Math.max(...scores);
        document.getElementById('low-v').innerText = lowCount;
    }

    function renderCharts(labels, data, pass, fail) {
        const ctx1 = document.getElementById('mainChart').getContext('2d');
        if(mainChart) mainChart.destroy();
        mainChart = new Chart(ctx1, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'أداء الطلاب',
                    data: data,
                    borderColor: '#1a237e',
                    backgroundColor: 'rgba(26, 35, 126, 0.1)',
                    fill: true, tension: 0.4, borderWidth: 3
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        const ctx2 = document.getElementById('pieChart').getContext('2d');
        if(pieChart) pieChart.destroy();
        pieChart = new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['متميز (80% فأكثر)', 'يحتاج تدريب'],
                datasets: [{
                    data: [pass, fail],
                    backgroundColor: ['#2e7d32', '#ffd700']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>

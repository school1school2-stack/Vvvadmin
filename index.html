<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم الاحترافية - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --main: #1a237e; --gold: #c5a021; --white: #ffffff; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .wrapper { max-width: 1200px; margin: auto; }
        .header { background: linear-gradient(135deg, var(--main), #0d47a1); color: var(--gold); padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--white); padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 4px solid var(--gold); }
        .card h3 { font-size: 0.9rem; color: #666; margin: 0; }
        .card .num { font-size: 2rem; font-weight: bold; color: var(--main); display: block; margin-top: 10px; }

        .charts-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px; margin-bottom: 30px; }
        .chart-container { background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); height: 400px; }
        
        table { width: 100%; background: var(--white); border-collapse: collapse; border-radius: 15px; overflow: hidden; }
        th { background: #eee; padding: 15px; text-align: right; color: var(--main); }
        td { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; }
        .badge { padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }
        .excel { background: #e8f5e9; color: #2e7d32; }
        .vgood { background: #e3f2fd; color: #1565c0; }
        .good { background: #fff3e0; color: #ef6c00; }
        .weak { background: #ffebee; color: #c62828; }
        
        .print-btn { background: var(--main); color: var(--gold); border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; float: left; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <h1>📊 لوحة التحليل الإحصائي للنماذج</h1>
        <p>إعداد الأستاذ: عبدالعزيز الفيفي</p>
    </div>

    <div class="stats-grid no-print">
        <div class="card"><h3>إجمالي الطلاب</h3><span class="num" id="total-s">0</span></div>
        <div class="card"><h3>متوسط الأداء</h3><span class="num" id="avg-p">0%</span></div>
        <div class="card"><h3>أعلى نسبة</h3><span class="num" id="max-p" style="color:green">0%</span></div>
        <div class="card"><h3>أدنى نسبة</h3><span class="num" id="min-p" style="color:red">0%</span></div>
    </div>

    <div class="charts-row">
        <div class="chart-container">
            <h3 style="text-align:center">📈 توزيع مستويات الطلاب (المنحنى الاحترافي)</h3>
            <canvas id="lineChart"></canvas>
        </div>
        <div class="chart-container">
            <h3 style="text-align:center">🎯 تصنيف التقديرات</h3>
            <canvas id="pieChart"></canvas>
        </div>
    </div>

    <button class="print-btn no-print" onclick="window.print()">🖨️ طباعة تقرير المدير</button>
    <h2 style="margin-top:0">📋 سجل نتائج النموذج 15</h2>
    <table>
        <thead>
            <tr>
                <th>اسم الطالب</th>
                <th>الدرجة</th>
                <th>النسبة</th>
                <th>التقدير</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let lineChart, pieChart;

    db.collection("student_results").orderBy("time", "desc").onSnapshot(snapshot => {
        let allData = [];
        let counts = { ممتاز: 0, جيدجدا: 0, جيد: 0, ضعيف: 0 };
        
        snapshot.forEach(doc => {
            const d = doc.data();
            const p = Math.round((d.score / d.total) * 100);
            let grade = "";
            let cls = "";

            if (p >= 90) { grade = "ممتاز"; cls = "excel"; counts.ممتاز++; }
            else if (p >= 80) { grade = "جيد جداً"; cls = "vgood"; counts.جيدجدا++; }
            else if (p >= 65) { grade = "جيد"; cls = "good"; counts.جيد++; }
            else { grade = "ضعيف"; cls = "weak"; counts.ضعيف++; }

            allData.push({ name: d.name, score: d.score, total: d.total, percent: p, grade: grade, cls: cls });
        });

        renderUI(allData, counts);
    });

    function renderUI(data, counts) {
        // تحديث الجدول
        let rows = "";
        data.forEach(s => {
            rows += `<tr><td>${s.name}</td><td>${s.score}/${s.total}</td><td>${s.percent}%</td><td><span class="badge ${s.cls}">${s.grade}</span></td></tr>`;
        });
        document.getElementById('table-body').innerHTML = rows;

        // تحديث الإحصائيات
        const percents = data.map(s => s.percent);
        document.getElementById('total-s').innerText = data.length;
        document.getElementById('avg-p').innerText = Math.round(percents.reduce((a,b)=>a+b,0)/percents.length) + "%";
        document.getElementById('max-p').innerText = Math.max(...percents) + "%";
        document.getElementById('min-p').innerText = Math.min(...percents) + "%";

        updateCharts(data, counts);
    }

    function updateCharts(data, counts) {
        // المنحنى الانسيابي (التدرج كما في الصور)
        const ctx1 = document.getElementById('lineChart').getContext('2d');
        const grad = ctx1.createLinearGradient(0, 0, 0, 400);
        grad.addColorStop(0, 'rgba(197, 160, 33, 0.4)');
        grad.addColorStop(1, 'rgba(197, 160, 33, 0)');

        if(lineChart) lineChart.destroy();
        lineChart = new Chart(ctx1, {
            type: 'line',
            data: {
                labels: data.map(s => s.name).reverse(),
                datasets: [{
                    label: 'نسبة النجاح',
                    data: data.map(s => s.percent).reverse(),
                    borderColor: '#c5a021',
                    borderWidth: 4,
                    fill: true,
                    backgroundColor: grad,
                    tension: 0.4,
                    pointBackgroundColor: '#1a237e',
                    pointRadius: 5
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // المخطط الدائري (التصنيف)
        const ctx2 = document.getElementById('pieChart').getContext('2d');
        if(pieChart) pieChart.destroy();
        pieChart = new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['ممتاز (90-100%)', 'جيد جداً (80-89%)', 'جيد (65-79%)', 'ضعيف (دون 65%)'],
                datasets: [{
                    data: [counts.ممتاز, counts.جيدجدا, counts.جيد, counts.ضعيف],
                    backgroundColor: ['#1b5e20', '#1565c0', '#f9a825', '#c62828']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>

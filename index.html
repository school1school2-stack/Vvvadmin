<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة تحليل النتائج - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #212121; --gold: #b19410; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .model-card { background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; overflow: hidden; border-right: 8px solid var(--gold); }
        .model-header { background: #fff; padding: 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .model-header:hover { background: #fefcf0; }
        .model-title { font-size: 1.3rem; font-weight: bold; color: var(--primary); }
        .stats-summary { display: flex; gap: 20px; font-size: 0.9rem; color: #666; }
        .model-content { display: none; padding: 20px; border-top: 1px solid #eee; background: #fafafa; }
        
        /* الرسوم البيانية */
        .analytics-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 20px; }
        .chart-container { background: white; padding: 15px; border-radius: 10px; border: 1px solid #eee; height: 300px; }

        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: center; }
        th { background: var(--primary); color: white; }
        .badge { background: var(--gold); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; color: var(--primary);">📊 لوحة تحليل نتائج الاختبارات</h1>
    <div id="models-wrapper">
        <p style="text-align: center;">جاري جلب البيانات وتحليلها...</p>
    </div>
</div>

<script>
    // إعدادات Firebase
    var firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    var db = firebase.firestore();

    // جلب البيانات
    db.collection("student_results").orderBy("time", "desc").onSnapshot(snap => {
        const modelsWrapper = document.getElementById("models-wrapper");
        modelsWrapper.innerHTML = "";
        
        let modelsData = {}; // لتجميع الطلاب حسب النموذج

        snap.forEach(doc => {
            const data = doc.data();
            const mName = data.model_name || "نموذج غير محدد";
            if (!modelsData[mName]) modelsData[mName] = [];
            modelsData[mName].push(data);
        });

        // إنشاء واجهة لكل نموذج
        Object.keys(modelsData).forEach((modelName, index) => {
            const students = modelsData[modelName];
            const totalStudents = students.length;
            const avgScore = (students.reduce((acc, curr) => acc + curr.score, 0) / totalStudents).toFixed(1);
            
            const card = document.createElement("div");
            card.className = "model-card";
            card.innerHTML = `
                <div class="model-header" onclick="toggleModel(${index})">
                    <div class="model-title">📂 ${modelName}</div>
                    <div class="stats-summary">
                        <span>👥 الطلاب: ${totalStudents}</span>
                        <span>📈 المتوسط: ${avgScore}</span>
                    </div>
                </div>
                <div id="content-${index}" class="model-content">
                    <div class="analytics-grid">
                        <div class="chart-container">
                            <canvas id="chart-pie-${index}"></canvas>
                        </div>
                        <div class="chart-container">
                            <canvas id="chart-bar-${index}"></canvas>
                        </div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>اسم الطالب</th>
                                <th>الدرجة</th>
                                <th>التاريخ</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${students.map(s => `
                                <tr>
                                    <td>${s.name}</td>
                                    <td><span class="badge">${s.score} / ${s.total}</span></td>
                                    <td>${s.time ? s.time.toDate().toLocaleString('ar-SA') : '...'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            modelsWrapper.appendChild(card);
            
            // رسم الرسوم البيانية لهذا النموذج
            renderCharts(index, students);
        });
    });

    function toggleModel(id) {
        const content = document.getElementById(`content-${id}`);
        content.style.display = content.style.display === "block" ? "none" : "block";
    }

    function renderCharts(id, students) {
        setTimeout(() => {
            const scores = students.map(s => s.score);
            const totalQuestions = students[0].total;

            // رسم بياني دائري (توزيع الدرجات)
            new Chart(document.getElementById(`chart-pie-${id}`), {
                type: 'doughnut',
                data: {
                    labels: ['درجات مرتفعة', 'درجات متوسطة', 'درجات منخفضة'],
                    datasets: [{
                        data: [
                            scores.filter(s => s > totalQuestions * 0.8).length,
                            scores.filter(s => s >= totalQuestions * 0.5 && s <= totalQuestions * 0.8).length,
                            scores.filter(s => s < totalQuestions * 0.5).length
                        ],
                        backgroundColor: ['#1b5e20', '#b19410', '#b71c1c']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'تحليل مستوى الطلاب' } } }
            });

            // رسم بياني عمودي (درجات الطلاب الفردية)
            new Chart(document.getElementById(`chart-bar-${id}`), {
                type: 'bar',
                data: {
                    labels: students.map(s => s.name.split(' ')[0]),
                    datasets: [{
                        label: 'درجة الطالب',
                        data: scores,
                        backgroundColor: '#212121'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: 'مقارنة درجات الطلاب' } } }
            });
        }, 500);
    }
</script>
</body>
</html>
